<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 400" fill="none">
  <!-- Background Circle -->
  <circle cx="200" cy="200" r="180" fill="#2D5016"/>
  
  <!-- Shield Shape -->
  <path d="M200 80 L280 120 L280 240 Q280 280 200 320 Q120 280 120 240 L120 120 Z" fill="#FFD700"/>
  <path d="M200 100 L260 132 L260 235 Q260 265 200 295 Q140 265 140 235 L140 132 Z" fill="#2D5016"/>
  
  <!-- Letter "O" in shield -->
  <circle cx="200" cy="190" r="50" stroke="#FFD700" stroke-width="12" fill="none"/>
  
  <!-- Leaf decorations -->
  <g fill="#4A7A2A" opacity="0.3">
    <ellipse cx="100" cy="150" rx="20" ry="40" transform="rotate(-30 100 150)"/>
    <ellipse cx="300" cy="150" rx="20" ry="40" transform="rotate(30 300 150)"/>
    <ellipse cx="100" cy="250" rx="20" ry="40" transform="rotate(30 100 250)"/>
    <ellipse cx="300" cy="250" rx="20" ry="40" transform="rotate(-30 300 250)"/>
  </g>
  
  <!-- Sparkle accents -->
  <circle cx="130" cy="100" r="6" fill="#FFD700" opacity="0.6"/>
  <circle cx="270" cy="100" r="6" fill="#FFD700" opacity="0.6"/>
  <circle cx="200" cy="60" r="8" fill="#FFD700" opacity="0.6"/>
</svg>